[build.env]
passthrough = ["RUST_BACKTRACE", "LIBCLANG_PATH"]

[target.x86_64-unknown-linux-gnu]
dockerfile = "./Dockerfile.cross-x86_64"

[target.x86_64-unknown-linux-gnu.env]
LIBCLANG_PATH = "/usr/lib/llvm-10/lib"

[target.aarch64-unknown-linux-gnu]
dockerfile = "./Dockerfile.cross-aarch64"

[target.aarch64-unknown-linux-gnu.env]
LIBCLANG_PATH = "/usr/lib/llvm-10/lib"
# Force clang for ARM64 and tell it where the ARM64 sysroot is
CC_aarch64_unknown_linux_gnu = "clang"
CXX_aarch64_unknown_linux_gnu = "clang++"
CFLAGS_aarch64_unknown_linux_gnu = "--target=aarch64-unknown-linux-gnu --sysroot=/usr/aarch64-linux-gnu"
BINDGEN_EXTRA_CLANG_ARGS = "--sysroot=/usr/aarch64-linux-gnu -I/usr/aarch64-linux-gnu/include"
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
PKG_CONFIG_SYSROOT_DIR = "/usr/aarch64-linux-gnu"
PKG_CONFIG_ALLOW_CROSS = "1"
# Avoid using cmake for aws-lc-sys if possible, or ensure it uses the right flags
AWS_LC_SYS_CMAKE_BUILDER = "1"
